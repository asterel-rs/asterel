# Asterel Docker Compose Example
#
# Quick start:
#   1. Copy this file and set your API key
#   2. Run: docker-compose up -d
#   3. Access gateway at http://localhost:3000
#
# For more info: https://github.com/asterel-rs/asterel

services:
  asterel:
    image: ghcr.io/asterel-rs/asterel:latest
    # Or build locally:
    # build: .
    container_name: asterel
    restart: unless-stopped
    pull_policy: always
    init: true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    environment:
      # Required: Your LLM provider API key
      - ASTEREL_API_KEY=${ASTEREL_API_KEY:-}
      # The container must bind all interfaces internally for Docker port
      # publishing; the host mapping below keeps access on loopback only.
      - ASTEREL_GATEWAY_ALLOW_PUBLIC_BIND=true

      # Optional: LLM provider (default: openrouter)
      # Options: openrouter, openai, anthropic, ollama
      - ASTEREL_PROVIDER=${ASTEREL_PROVIDER:-openrouter}

      # Optional: Model override
      # - ASTEREL_MODEL=anthropic/claude-sonnet-4-20250514

    volumes:
      # Persist workspace and config
      - asterel-data:/asterel-data

    ports:
      # Gateway API port. Keep the example reachable from the host only;
      # deployments that intentionally expose it should use a trusted proxy.
      - "127.0.0.1:3000:3000"

    command: ["gateway", "--port", "3000", "--host", "[::]"]

    # Health check
    healthcheck:
      test: ["CMD", "asterel", "doctor"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  asterel-data:
