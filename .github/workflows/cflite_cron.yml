name: ClusterFuzzLite Prune & Coverage
on:
  schedule:
    # Weekly on Sundays at 04:00 UTC
    - cron: "0 4 * * 0"

permissions:
  contents: read
  security-events: write

jobs:
  prune:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build fuzzers
        id: build
        uses: google/clusterfuzzlite/actions/build_fuzzers@v1
        with:
          language: rust
      - name: Run fuzzers (prune)
        id: run
        uses: google/clusterfuzzlite/actions/run_fuzzers@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: 600
          mode: prune

  coverage:
    runs-on: ubuntu-latest
    needs: prune
    steps:
      - uses: actions/checkout@v7
      - name: Build fuzzers (coverage)
        id: build
        uses: google/clusterfuzzlite/actions/build_fuzzers@v1
        with:
          language: rust
          sanitizer: coverage
      - name: Run fuzzers (coverage)
        id: run
        uses: google/clusterfuzzlite/actions/run_fuzzers@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: 600
          mode: coverage
          sanitizer: coverage
