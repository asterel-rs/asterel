# cargo-deny configuration — v2 schema
# https://embarkstudios.github.io/cargo-deny/

[advisories]
unmaintained = "workspace"
yanked = "warn"

[licenses]
# All licenses are denied unless explicitly allowed
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "0BSD",
    "CC0-1.0",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
unused-allowed-license = "allow"
private = { ignore = true }

[bans]
multiple-versions = "warn"
wildcards = "allow"
# Tolerated version duplicates that come from transitive upstream deps.
# Each entry pins the *older* version that cannot be unified without upstream changes.
skip = [
    # rust-i18n-support uses toml 0.8; blocked on rust-i18n upgrade
    { name = "toml",          version = "0.8" },
    { name = "toml_datetime", version = "0.6" },
    { name = "serde_spanned", version = "0.6" },
    # sqlx-core and tokio-tungstenite pin webpki-roots ^0.26
    { name = "webpki-roots",  version = "0.26" },
    # cron 0.16 depends on phf 0.11
    { name = "phf",           version = "0.11" },
    { name = "phf_shared",    version = "0.11" },
    { name = "phf_generator", version = "0.11" },
    { name = "phf_macros",    version = "0.11" },
    # globwalk (via rust-i18n-support) pins bitflags 1
    { name = "bitflags",      version = "1" },
    # rand ecosystem: proptest (dev-dep) pulls 0.8/0.9; production code uses 0.10
    { name = "rand",          version = "0.8" },
    { name = "rand",          version = "0.9" },
    { name = "rand_core",     version = "0.6" },
    { name = "rand_chacha",   version = "0.3" },
    # getrandom: pulled by multiple crypto crates targeting different rand generations
    { name = "getrandom",     version = "0.2" },
    { name = "getrandom",     version = "0.3" },
    # cpufeatures: argon2 0.5 uses 0.2; newer crates use 0.3
    { name = "cpufeatures",   version = "0.2" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
